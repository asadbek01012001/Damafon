; ─────────────────────────────────────────────────
;  Transports
; ─────────────────────────────────────────────────

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

; ─────────────────────────────────────────────────
;  Dahua Intercom (SIP Device — UDP)
; ─────────────────────────────────────────────────

[dahua-auth]
type=auth
auth_type=userpass
username=dahua
password=dahua_sip_2024!

[dahua-aor]
type=aor
max_contacts=1
qualify_frequency=30

[dahua]
type=endpoint
transport=transport-udp
context=dahua_inbound
disallow=all
allow=ulaw
allow=alaw
allow=gsm
auth=dahua-auth
aors=dahua-aor
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[dahua]
type=identify
endpoint=dahua
match=0.0.0.0/0

; ─────────────────────────────────────────────────
;  Hikvision Intercom (SIP Device — UDP)
; ─────────────────────────────────────────────────

[hikvision-auth]
type=auth
auth_type=userpass
username=hikvision
password=hikvision_sip_2024!

[hikvision-aor]
type=aor
max_contacts=1
qualify_frequency=30

[hikvision]
type=endpoint
transport=transport-udp
context=dahua_inbound
disallow=all
allow=ulaw
allow=alaw
allow=gsm
allow=h264
auth=hikvision-auth
aors=hikvision-aor
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

; ─────────────────────────────────────────────────
;  Web Browser SIP Phone (WebRTC over WebSocket)
; ─────────────────────────────────────────────────

[webphone-auth]
type=auth
auth_type=userpass
username=webphone
password=webphone_2024!

[webphone-aor]
type=aor
max_contacts=3
remove_existing=yes
qualify_frequency=30

[webphone]
type=endpoint
transport=transport-ws
context=webphone_inbound
disallow=all
allow=opus
allow=ulaw
allow=alaw
auth=webphone-auth
aors=webphone-aor
webrtc=yes
use_avpf=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
dtls_cert_file=/etc/asterisk/keys/asterisk.crt
dtls_private_key=/etc/asterisk/keys/asterisk.key
ice_support=yes
direct_media=no
force_rport=yes
rewrite_contact=yes
