; ─────────────────────────────────────────────────
;  Global — realm va user agent
; ─────────────────────────────────────────────────

[global]
type=global
user_agent=Damafon/1.0
; SIP realm — SIP.js da 'sip:webphone@asterisk' bilan mos keladi
realm=asterisk

; ─────────────────────────────────────────────────
;  Transports
; ─────────────────────────────────────────────────

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Docker ichida Asterisk o'z konteyner IP sini (172.17.x.x) reklamalaydi.
; Brauzer va Dahua unga yeta olmaydi. HOST_IP orqali haqiqiy server IP ni beramiz.
external_media_address=${ENV(HOST_IP)}
external_signaling_address=${ENV(HOST_IP)}
; Bu IP lar lokal — STUN ishlatilmaydi, to'g'ridan-to'g'ri kanal ochiladi
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060

[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088
; WebRTC ICE uchun haqiqiy server IP lazim
external_media_address=${ENV(HOST_IP)}
external_signaling_address=${ENV(HOST_IP)}
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

; ─────────────────────────────────────────────────
;  Dahua VTO Intercom (SIP Device — UDP)
;
;  MUHIM: Dahua VTO da SIP yoqilganda,
;  Username = Room Number (masalan 8001) — o'zgartirib bo'lmaydi!
;  Shuning uchun bu yerda username ham 8001 bo'lishi shart.
;
;  Dahua admin panelida:
;    Network > SIP Server
;      Server IP : <bu serverni IP si>
;      Port       : 5060
;      Username   : (avtomatik, Room No = 8001)
;      Password   : DAHUA_SIP_PASSWORD .env dan
;      Register   : Enable
; ─────────────────────────────────────────────────

[dahua-auth]
type=auth
auth_type=userpass
; KRITIK: username = Room Number (DAHUA_ROOM_NO .env da)
username=${ENV(DAHUA_ROOM_NO)}
password=${ENV(DAHUA_SIP_PASSWORD)}

[dahua-aor]
type=aor
max_contacts=1
; Dahua qurilmasi tirik ekanligini tekshiradi (OPTIONS ping)
qualify_frequency=30
qualify_timeout=3

[dahua]
type=endpoint
transport=transport-udp
context=dahua_inbound
disallow=all
; Dahua VTO G.711 (ulaw/alaw) ni qo'llab-quvvatlaydi
allow=ulaw
allow=alaw
allow=gsm
auth=dahua-auth
aors=dahua-aor
; Asterisk media proxy vazifasini o'taydi (Dahua bilan to'g'ridan-to'g'ri media yo'q)
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[dahua]
type=identify
endpoint=dahua
; Faqat Dahua qurilmasi IP sidan kelgan paketlarni bu endpoint ga bog'laydi.
; 0.0.0.0/0 emas — xavfsiz.
match=${ENV(DAHUA_HOST)}

; ─────────────────────────────────────────────────
;  Hikvision Intercom (SIP Device — UDP)
; ─────────────────────────────────────────────────

[hikvision-auth]
type=auth
auth_type=userpass
username=hikvision
password=hikvision_sip_2024!

[hikvision-aor]
type=aor
max_contacts=1
qualify_frequency=30

[hikvision]
type=endpoint
transport=transport-udp
context=dahua_inbound
disallow=all
allow=ulaw
allow=alaw
allow=gsm
allow=h264
auth=hikvision-auth
aors=hikvision-aor
direct_media=no
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

; ─────────────────────────────────────────────────
;  Web Browser SIP Phone (WebRTC over WebSocket)
; ─────────────────────────────────────────────────

[webphone-auth]
type=auth
auth_type=userpass
username=webphone
password=webphone_2024!

[webphone-aor]
type=aor
; Bir vaqtda bir nechta brauzer tab ochiladigan bo'lsa max_contacts oshiriladi
max_contacts=3
remove_existing=yes
qualify_frequency=30

[webphone]
type=endpoint
transport=transport-ws
context=webphone_inbound
disallow=all
; Brauzer Opus ni afzal ko'radi (yuqori sifat); Asterisk G.711 <-> Opus transcode qiladi
allow=opus
allow=ulaw
allow=alaw
auth=webphone-auth
aors=webphone-aor
; WebRTC majburiy parametrlar
webrtc=yes
use_avpf=yes
media_encryption=dtls
dtls_verify=fingerprint
; actpass: Asterisk ham aktiv, ham passiv bo'la oladi — brauzer tanlaydi
dtls_setup=actpass
dtls_cert_file=/etc/asterisk/keys/asterisk.crt
dtls_private_key=/etc/asterisk/keys/asterisk.key
ice_support=yes
direct_media=no
force_rport=yes
rewrite_contact=yes
