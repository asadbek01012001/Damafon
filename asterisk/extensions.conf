; ─────────────────────────────────────────────────
;  Dahua Intercom Inbound
;  → Routes all calls to the Stasis (ARI) app
; ─────────────────────────────────────────────────

[dahua_inbound]
exten => _.,1,NoOp(=== Incoming Dahua call: ${CALLERID(num)} ===)
 same => n,Set(CHANNEL(hangup_handler_push)=hangup_handler,s,1)
 same => n,Stasis(intercom)
 same => n,Hangup()

[hangup_handler]
exten => s,1,NoOp(=== Call hangup: ${CHANNEL} ===)
 same => n,Return()

; ─────────────────────────────────────────────────
;  Web Phone Inbound (from Asterisk dial-out)
; ─────────────────────────────────────────────────

[webphone_inbound]
exten => webphone,1,NoOp(=== Incoming to web phone ===)
 same => n,Answer()
 same => n,Wait(600)
 same => n,Hangup()

; ─────────────────────────────────────────────────
;  Default (catch-all)
; ─────────────────────────────────────────────────

[default]
exten => _.,1,Hangup(21)
